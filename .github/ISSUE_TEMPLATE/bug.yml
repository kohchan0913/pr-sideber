name: Bug Report
description: バグの報告
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "## バグ報告"
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているか1〜2文で
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現する手順
      placeholder: |
        1. Side Panel を開く
        2. リロードボタンを押す
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: 技術メモ
      description: エラーログ、スクリーンショット、影響範囲など (任意)
